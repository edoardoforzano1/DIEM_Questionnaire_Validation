# =============================================================================
#  DIEM Questionnaire Validation - Centralized Configuration
#  Edit ONLY this file. Never touch the notebook code.
# =============================================================================

# Which tool to run: kobo | geopoll
# Optional quick-switch profile file in config_profiles/ (or absolute path).
# Example: "geopoll_ar_yem_latest_template.yaml"
config_profile: ""

# Optional custom folder containing profile files.
# If empty, defaults to <output_dir>/config_profiles/
config_profiles_dir: ""

tool: "kobo"

# =============================================================================
#  CORE SETTINGS  (used identically by both tools — change these each run)
# =============================================================================

# Working directory: input files are resolved relative to this folder.
working_dir: "C:/Temp"

# Current questionnaire filename (resolved under working_dir).
questionnaire_file: "DIEM_Monitoring questionnaire_kobo_en_AFG_20260415.xlsx"

# Language code: en | fr | ar | es
language: "en"

# ISO3 country code
iso3: "AFG"

# Reference mode:
#   latest_template -> auto-detect newest matching file in templates_dir
#   previous_round  -> compare against previous_round_file in working_dir
reference_mode: "latest_template"

# Only used when reference_mode = previous_round
previous_round_file: "validated_questionnaire_kobo_ar_PSE_20250623155613.xlsx"

# Folder containing all template Excel files
templates_dir: "c:/Users/edoar/WORK/FAO/repo/questionnaire_validation_revision/Questionnaires/Questionnaire Templates"

# Base output folder. Each tool writes to its own subfolder automatically:
#   kobo   -> output_dir/kobo_output/
#   geopoll -> output_dir/geopoll_output/
output_dir: "C:/Temp/questionnaire_validation"

# Module names to ignore in comparison (shared by KoBo and GeoPoll).
# Differences inside these modules are excluded from issue reporting.
# Accepts either module keys or visible module labels.
ignore_modules_from_comparison: []

# Module names to skip entirely from validated output (shared by KoBo and GeoPoll).
# These modules are excluded from comparison and removed from validated questionnaire output.
skip_modules_from_validated_output: []


# =============================================================================
#  KOBO-SPECIFIC OPTIONS  (only read by the kobo notebook)
# =============================================================================

kobo_options:
  # Choice list names treated as country-parameter lists (crop/admin/etc).
  country_specific_list_names:
    - "crop"
    - "crop2"
    - "crop3"
    - "admin1"
    - "admin2"
    - "crp_main_sales2"

  # Question names to skip from option-level comparison (temporary operational fields).
  exclude_qnames_from_option_compare:
    - "enumerator"
    - "enum_team"

# Report metadata
validation_number: 1
user_name: "Edoardo"
